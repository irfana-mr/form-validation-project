<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>

    <style>
        body{
            background-image: url(https://4kwallpapers.com/images/wallpapers/bmw-m4-competition-black-cars-2020-5k-3840x2160-3118.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        div{
            width: 40%;
            box-shadow: 5px 5px 5px black;
            border: 3px solid black;
            border-radius: 50px;
            color: rgb(207, 202, 202);
            font-size: xx-large;
            font-weight: bolder;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input{
            width: 300px;
            height: 40px;
            border: 3px solid black;
            border-radius: 30px;
        }
        button{
            width: 150px;
            height: 40px;
            background-color: black;
            color: white;
            border: 3px solid white;
            border-radius: 30px;
            font-size: large;
        }
        td{
            padding-bottom: 30px;
            padding-left: 30px;
        }
        #demo{
            color: aliceblue;
            border: none;
            background-color: gray;
            
        }
    </style>
</head>
<body>
    <div>
    <h1>Login Here</h1>

        <form >
            <table>
                <tr>
                    <td><label for="na">Name</label></td>
                    <td><input type="text" class="na"></td>
                </tr>
                <tr>
                    <td><label for="nu">Number</label></td>
                    <td><input type="number" class="nu"></td>
                </tr>
                <tr>
                    <td><label for="em">Email</label></td>
                    <td><input type="email" class="em"></td>
                </tr>
                <tr>
                    <td><label for="pa">Password</label></td>
                    <td><input type="password" class="pa"></td>
                </tr>
                <tr>
                     <td><button>Login</button></td>
                </tr>
            </table>
        </form>
        <div id="demo">

        </div>
    </div>
</body>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
    function googleTranslateElementInit(){
        new google.translate.TranslateElement({pageLanguage:'en'},'demo')
    }
</script>
</html>
